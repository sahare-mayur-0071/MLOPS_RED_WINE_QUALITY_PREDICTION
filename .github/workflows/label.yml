name: GSSoC

on:
  issues:
    types: [opened]
  workflow_dispatch:

jobs:
  add-gssoc-label:
    runs-on: ubuntu-latest
    
    permissions:
      issues: write

    steps:
      - name: Ensure label and add to issue
        uses: actions/github-script@v7
        
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            const issue_number = context.payload.issue.number;
            const labelName = 'GSSoC';
            
            const color = 'CCCCCC'; 
            const description = 'Under GirlScript Summer of Code';
            
            try {
              // Check if the label exists in the repo
              
              await github.rest.issues.getLabel({
                owner,
                repo,
                name: labelName
              });
              
              console.log(`Label "${labelName}" already exists. Skipping creation.`);
            } catch (err) {
              // If it returns a 404, it means the label doesn't exist yet, so we build it
              
              if (err.status === 404) {
                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: labelName,
                    color,
                    description
                  });
                  
                  console.log(`Successfully created missing label: "${labelName}"`);
                } catch (createErr) {
                  // Handle potential race condition if two issues open at the exact same time
                  
                  if (createErr.status !== 422) {
                    throw createErr;
                  }
                }
              } else {
                throw err;
              }
            }


            // Apply the label to the opened issue
            
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: [labelName]
            });
            
            console.log(`Successfully labeled Issue #${issue_number} with "${labelName}"`);



            
