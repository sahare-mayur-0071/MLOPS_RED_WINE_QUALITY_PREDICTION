name: Issue Assignment 

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  assign:
    name: Auto-assign contributor
    runs-on: ubuntu-latest
    
    # skip pull request comments
    if: github.event.issue.pull_request == null
    steps:
      - name: Handle assignment request
        uses: actions/github-script@v7
        
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const comment = context.payload.comment.body.toLowerCase().trim();
            const KEYWORDS = [
              "/assign",
              "assign me",
              "i'd like to work on this",
              "i want to work on this",
              "can i work on this",
              "please assign me"
            ];

            // 1. Check if the comment matches any assignment keyword
            
            if (!KEYWORDS.some(kw => comment.includes(kw))) return;
            
            // Skip automated bot comments
            if (context.payload.comment.user.type === 'Bot') return;

            const { owner, repo } = context.repo;
            const issueNumber = context.payload.issue.number;
            const commenter = context.payload.comment.user.login;

            // 2. Fetch live issue data from the GitHub API to avoid race conditions
            
            const { data: issue } = await github.rest.issues.get({
              owner, repo, issue_number: issueNumber,
            });

            if (issue.state !== 'open') return;

            // 3. Check if the issue has been processed by your auto-labeler
            
            const currentLabels = issue.labels.map(l => l.name);
            if (!currentLabels.includes('GSSoC')) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber,
                body: `@${commenter} This issue has not been verified for GSSoC yet. Please wait until a project admin reviews it and adds the tracking labels!`,
              });
              return;
            }

            // 4. Check if the issue is already taken
            
            if (issue.assignees && issue.assignees.length > 0) {
              const assignees = issue.assignees.map(a => a.login);
              if (assignees.includes(commenter)) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNumber,
                  body: `@${commenter} You are already assigned to this issue! Please link your upcoming Pull Request to this ticket.`,
                });
              } else {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNumber,
                  body: `@${commenter} This issue is already claimed by @${assignees.join(', @')}. Keep an eye out for other open tasks!`,
                });
              }
              return;
            }

            // 5. Assign the contributor
            
            await github.rest.issues.addAssignees({
              owner, repo, issue_number: issueNumber,
              assignees: [commenter],
            });

            // 6. Update so others know it is taken
            
            if (!currentLabels.includes('gssoc-assigned')) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: issueNumber,
                labels: ['gssoc-assigned'],
              });
            }

            // 7. Post message
            
            await github.rest.issues.createComment({
              owner, repo, issue_number: issueNumber,
              body: ` Assigned to @${commenter}! Please drop your PR within **7 days**. `,
            });






            
